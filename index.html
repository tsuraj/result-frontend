<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Hire Sarkar — Latest Government Jobs, Results & Admit Cards</title>
    <meta
      name="description"
      content="Hire Sarkar is India's trusted government job portal for the latest Sarkari jobs, results, admit cards, answer keys and syllabus. Get fast updates on SSC, UPSC, Railway, Banking and State Govt recruitment."
    />
    <meta
      name="keywords"
      content="government jobs, sarkari naukri, sarkari result, latest govt jobs, admit card, answer key, syllabus, SSC, UPSC, Railway, Banking jobs, state government jobs"
    />
    <meta name="author" content="Hire Sarkar" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#dc2626" />

    <!-- Canonical is set per-route by the app (useDocumentMeta); intentionally
         omitted here so the raw shell never claims a wrong (homepage) canonical. -->

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Hire Sarkar" />
    <meta property="og:title" content="Hire Sarkar — Latest Government Jobs, Results & Admit Cards" />
    <meta
      property="og:description"
      content="Latest Sarkari jobs, results, admit cards, answer keys and syllabus — fast, reliable updates for SSC, UPSC, Railway, Banking and State Govt exams."
    />
    <meta property="og:url" content="https://hiresarkar.com/" />
    <meta property="og:image" content="https://hiresarkar.com/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hire Sarkar — Latest Government Jobs, Results & Admit Cards" />
    <meta
      name="twitter:description"
      content="Latest Sarkari jobs, results, admit cards, answer keys and syllabus — fast, reliable updates for SSC, UPSC, Railway, Banking and State Govt exams."
    />
    <meta name="twitter:image" content="https://hiresarkar.com/og-image.png" />

    <!-- Organization + WebSite structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "Hire Sarkar",
            "url": "https://hiresarkar.com/",
            "logo": "https://hiresarkar.com/og-image.png",
            "description": "India's trusted government job portal for the latest Sarkari jobs, results, admit cards, answer keys and syllabus.",
            "email": "hiresarkar590@gmail.com"
          },
          {
            "@type": "WebSite",
            "name": "Hire Sarkar",
            "url": "https://hiresarkar.com/",
            "potentialAction": {
              "@type": "SearchAction",
              "target": {
                "@type": "EntryPoint",
                "urlTemplate": "https://hiresarkar.com/latest-jobs?q={search_term_string}"
              },
              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
